<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chamberlain Group — Uniform Order Form</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#B8D4E8;color:#1a1a1a;min-height:100vh}
.page{max-width:900px;margin:0 auto;padding:2rem 1.5rem}
header{margin-bottom:2rem}
header h1{font-size:22px;font-weight:600;color:#1a1a1a}
header p{font-size:14px;color:#666;margin-top:4px}
.cat-label{font-size:11px;font-weight:600;color:#2c2c2c;text-transform:uppercase;letter-spacing:.07em;margin:1.75rem 0 10px}
.item-card{background:#fff;border:1px solid #e5e5e3;border-radius:12px;margin-bottom:10px;overflow:hidden;transition:border-color .15s}
.item-card.selected{border-color:#185FA5;border-width:2px}
.item-top{display:flex;align-items:center;gap:12px;padding:12px 14px;cursor:pointer}
.item-thumb{width:56px;height:56px;object-fit:contain;border-radius:6px;background:#f9f9f7;flex-shrink:0;border:1px solid #eee}
.item-check{width:17px;height:17px;accent-color:#185FA5;cursor:pointer;flex-shrink:0}
.item-info{flex:1;min-width:0}
.item-name{font-size:14px;font-weight:500;color:#1a1a1a;line-height:1.3}
.item-code{font-size:12px;color:#999;margin-top:2px}
.badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px;background:#FFF3E0;color:#E65100;border:1px solid #FFCC80;white-space:nowrap}
.item-body{padding:0 14px 14px;display:none;border-top:1px solid #f0f0ee}
.item-body.open{display:block}
.opt-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;align-items:center}
.opt-label{font-size:12px;color:#888;flex-shrink:0}
.opt-btn{font-size:12px;padding:3px 10px;border-radius:20px;border:1px solid #ddd;background:transparent;color:#555;cursor:pointer;font-family:inherit}
.opt-btn.active{background:#185FA5;color:#fff;border-color:#185FA5}
.opt-btn.logo-chamberlain{background:#1B3A6B;color:#fff;border-color:#1B3A6B}
.opt-btn.logo-merlin{background:#5AAB2E;color:#fff;border-color:#5AAB2E}
.opt-btn.logo-grifco{background:#B71C1C;color:#fff;border-color:#B71C1C}
.opt-btn.logo-zeroharm{background:#E65100;color:#fff;border-color:#E65100}
.sizes-wrap{margin-top:10px}
.sizes-label{font-size:12px;color:#888;margin-bottom:6px}
.sizes-row{display:flex;flex-wrap:wrap;gap:8px}
.size-group{display:flex;flex-direction:column;align-items:center;gap:3px}
.size-lbl{font-size:11px;color:#888;font-weight:500}
.size-inp{width:46px;text-align:center;font-size:13px;padding:4px 3px;border-radius:7px;border:1px solid #ddd;background:#fafafa;color:#1a1a1a}
.size-inp:focus{outline:none;border-color:#185FA5;background:#fff}
.summary{background:#fff;border:1px solid #e5e5e3;border-radius:12px;padding:14px 16px;margin:1.5rem 0;display:none}
.sum-hdr{font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
.sum-row{display:flex;justify-content:space-between;align-items:baseline;padding:5px 0;border-bottom:1px solid #f0f0ee;font-size:13px;gap:10px}
.sum-row:last-child{border-bottom:none}
.sum-name{color:#555;flex:1}
.sum-qty{color:#1a1a1a;font-weight:500;text-align:right;font-size:12px}
hr.divider{border:none;border-top:1px solid #e5e5e3;margin:1.75rem 0}
.section-hdr{font-size:11px;font-weight:600;color:#2c2c2c;text-transform:uppercase;letter-spacing:.07em;margin-bottom:12px}
.fields{display:flex;flex-direction:column;gap:10px;margin-bottom:1.5rem}
.field-row{display:flex;gap:10px}
.field{display:flex;flex-direction:column;gap:4px;flex:1}
.field label{font-size:12px;color:#666}
.field input,.field textarea{font-size:14px;border-radius:8px;border:1px solid #ddd;padding:8px 10px;background:#fff;color:#1a1a1a;width:100%;font-family:inherit}
.field textarea{resize:vertical;min-height:64px}
.btn-row{display:flex;gap:8px;flex-wrap:wrap}
.btn{padding:9px 18px;border-radius:8px;font-size:14px;cursor:pointer;border:1px solid #ddd;background:#fff;color:#1a1a1a;font-family:inherit}
.btn:hover{background:#f5f5f3}
.btn.primary{background:#185FA5;color:#fff;border-color:#185FA5}
.btn.primary:hover{background:#0C447C}
.btn:disabled{opacity:0.6;cursor:not-allowed}
.preview-box{background:#fff;border:2px solid #185FA5;border-radius:12px;padding:20px;margin-top:1.25rem;display:none}
.preview-box h3{font-size:15px;font-weight:600;color:#1a1a1a;margin-bottom:4px}
.preview-meta{font-size:12px;color:#666;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid #eee}
.preview-content{background:#f9f9f7;border-radius:8px;padding:14px;font-size:12px;font-family:monospace;white-space:pre-wrap;line-height:1.8;color:#1a1a1a;border:1px solid #eee;margin-bottom:16px;max-height:320px;overflow-y:auto}
.success-box{background:#E8F5E9;border:1px solid #A5D6A7;border-radius:12px;padding:16px;margin-top:1.25rem;font-size:14px;color:#2E7D32;display:none}
.colour-row-block{background:#f9f9f7;border:1px solid #eee;border-radius:8px;padding:10px 12px;margin-top:8px}
.colour-row-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.remove-colour{font-size:11px;color:#999;cursor:pointer;border:none;background:none;font-family:inherit;padding:2px 6px}
.remove-colour:hover{color:#e53935}
.add-colour-btn{font-size:12px;color:#185FA5;cursor:pointer;border:1px dashed #185FA5;background:none;border-radius:6px;padding:5px 12px;margin-top:8px;font-family:inherit;width:100%}
.add-colour-btn:hover{background:#f0f6ff}
@media(max-width:600px){.field-row{flex-direction:column}.item-thumb{width:44px;height:44px}}
</style>
</head>
<body>
<div class="page">
  <header>
    <h1>Chamberlain Group — uniform order form</h1>
    <p>Select items, choose colour and logo, enter quantities by size, then preview and send your order to Good Gear.</p>
  </header>

  <div id="catalogue"></div>

  <div class="summary" id="summaryBox">
    <div class="sum-hdr">Order summary</div>
    <div id="summaryRows"></div>
  </div>

  <hr class="divider">
  <div class="section-hdr">Your details</div>
  <div class="fields">
    <div class="field-row">
      <div class="field"><label>Your name *</label><input id="senderName" placeholder="e.g. Sarah Mitchell" /></div>
      <div class="field"><label>Department / site</label><input id="dept" placeholder="e.g. Operations – Sydney" /></div>
    </div>
    <div class="field-row">
      <div class="field"><label>Your email *</label>
      <select id="senderEmail" style="font-size:14px;border-radius:8px;border:1px solid #ddd;padding:8px 10px;background:#fff;color:#1a1a1a;width:100%;font-family:inherit">
        <option value="">— Select your email —</option>
        <option value="Lee-ann.Thoroughgood@chamberlainanz.com">Lee-Ann Thoroughgood — Lee-ann.Thoroughgood@chamberlainanz.com</option>
        <option value="shannan.booth@chamberlain.com">Shanan Booth — shannan.booth@chamberlain.com</option>
        <option value="nicole.geary@chamberlainanz.com">Nicole Geary — nicole.geary@chamberlainanz.com</option>
        <option value="Nicole.Wilson@chamberlainanz.com">Nicole Wilson — Nicole.Wilson@chamberlainanz.com</option>
      </select>
    </div>
      <div class="field"><label>Required by date</label><input id="dueDate" type="date" /></div>
    </div>
    <div class="field"><label>Ship to — delivery address *</label>
      <select id="shipTo" style="font-size:14px;border-radius:8px;border:1px solid #ddd;padding:8px 10px;background:#fff;color:#1a1a1a;width:100%;font-family:inherit">
        <option value="">— Select a delivery location —</option>
        <option value="Chamberlain Group&#10;Suite G.02 City Views Business Park&#10;65 Epping Road&#10;Macquarie Park NSW 2113">Macquarie Park NSW — Suite G.02, City Views Business Park, 65 Epping Road</option>
        <option value="Chamberlain Group&#10;110 Somersby Falls Road&#10;Somersby NSW 2250">Somersby NSW — 110 Somersby Falls Road</option>
        <option value="Chamberlain Group&#10;Unit 1/11 Morrison Close&#10;Mansfield QLD 4122">Mansfield QLD — Unit 1/11 Morrison Close</option>
        <option value="Chamberlain Group&#10;1 Dexter Drive&#10;Epping VIC 3076">Epping VIC — 1 Dexter Drive</option>
        <option value="Chamberlain Group&#10;Unit 1, 9 Sharp Close&#10;Mawson Lakes SA 5095">Mawson Lakes SA — Unit 1, 9 Sharp Close</option>
        <option value="Chamberlain Group&#10;54 Millrose Drive&#10;Malaga WA 6090">Malaga WA — 54 Millrose Drive</option>
        <option value="Chamberlain Group&#10;17B Arrenway Drive&#10;Rosedale Auckland 0632&#10;New Zealand">Rosedale Auckland NZ — 17B Arrenway Drive</option>
      </select>
    </div>
    <div class="field"><label>Additional notes</label><textarea id="notes" placeholder="e.g. Please deliver to loading dock, use Chamberlain Group logo on all items…"></textarea></div>
    <div class="field-row">
      <div class="field"><label>Purchase order number</label><input id="poNumber" placeholder="e.g. PO-2024-0123" /></div>
      <div class="field"><label>Attach documents <span style="color:#999;font-weight:400">(PO, catalogues, etc. — optional)</span></label><input type="file" id="poFile" accept=".pdf,.doc,.docx,.xls,.xlsx,.png,.jpg" multiple style="padding:6px 10px;font-size:13px" /></div>
    </div>
  </div>

  <div class="btn-row">
    <button class="btn primary" onclick="previewOrder()">&#128269; Preview &amp; send order</button>
    <button class="btn" onclick="clearAll()">&#8635; Clear all</button>
  </div>

  <div class="preview-box" id="previewBox">
    <h3>&#128338; Review your order before sending</h3>
    <div class="preview-meta" id="previewMeta"></div>
    <div class="preview-content" id="previewContent"></div>
    <div class="btn-row">
      <button class="btn primary" id="confirmBtn" onclick="confirmSend()">&#10003; Confirm &amp; send to Good Gear</button>
      <button class="btn" onclick="cancelPreview()">&#8592; Go back &amp; edit</button>
    </div>
  </div>

  <div class="success-box" id="successBox">
    &#10003; Your order has been sent to Good Gear (salessupport@goodgear.com.au).
  </div>

</div>

const LOGOS = ["Chamberlain","Merlin","Grifco"];
let state = {};

function initState() {
  state = {};
  CATALOGUE.forEach(cat => cat.items.forEach(item => {
    state[item.code] = { selected: false, colourRows: [{colour: item.colours[0], qty: {}}], logo: "Chamberlain", zeroHarm: false };
  }));
}

function buildColourRows(code, rows, colours, sizes) {
  return rows.map((row, ri) => {
    const colBtns = colours.map(c =>
      '<button class="opt-btn' + (row.colour===c?" active":"") + '" onclick="setRowColour(\'' + code + '\',' + ri + ',\'' + c + '\')">' + c + '</button>'
    ).join("");
    const sizeInps = sizes.map(sz =>
      '<div class="size-group"><span class="size-lbl">' + sz + '</span><input class="size-inp" type="number" min="0" step="1" placeholder="0" value="' + (row.qty[sz]||"") + '" oninput="setRowQty(\'' + code + '\',' + ri + ',\'' + sz + '\',this.value)" /></div>'
    ).join("");
    const removeBtn = rows.length > 1 ? '<button class="remove-colour" onclick="removeColourRow(\'' + code + '\',' + ri + ')">✕ Remove</button>' : "";
    const colourLabel = colours.length > 1
      ? '<div class="opt-row" style="margin-bottom:6px"><span class="opt-label">Colour:</span>' + colBtns + '</div>'
      : '<div style="font-size:12px;color:#888;margin-bottom:6px">Colour: ' + colours[0] + '</div>';
    return '<div class="colour-row-block"><div class="colour-row-header">' + colourLabel + removeBtn + '</div><div class="sizes-row">' + sizeInps + '</div></div>';
  }).join("");
}

function renderCatalogue() {
  const el = document.getElementById("catalogue");
  el.innerHTML = "";
  CATALOGUE.forEach(cat => {
    const cl = document.createElement("div");
    cl.className = "cat-label";
    cl.textContent = cat.cat;
    el.appendChild(cl);
    cat.items.forEach(item => {
      const s = state[item.code];
      const card = document.createElement("div");
      card.className = "item-card" + (s.selected ? " selected" : "");
      card.id = "card-" + item.code;

      const imgSrc = IMAGES[item.code] || null;
      const imgHtml = imgSrc
        ? '<img class="item-thumb" src="' + imgSrc + '" alt="' + item.name + '" />'
        : '<div class="item-thumb" style="display:flex;align-items:center;justify-content:center;color:#ccc;font-size:20px">?</div>';

      const logoClassMap = {"Chamberlain":"logo-chamberlain","Merlin":"logo-merlin","Grifco":"logo-grifco","Zero Harm":"logo-zeroharm"};
      const logoBtns = LOGOS.map(l =>
        '<button class="opt-btn' + (s.logo===l?" "+logoClassMap[l]:"") + '" onclick="setLogo(\'' + item.code + '\',\'' + l + '\')">' + l + '</button>'
      ).join("");

      const zeroHarmChecked = s.zeroHarm ? "checked" : "";
      const colourRowsHtml = buildColourRows(item.code, s.colourRows, item.colours, item.sizes);
      const addColourBtn = item.colours.length > 1
        ? '<button class="add-colour-btn" onclick="addColourRow(\'' + item.code + '\')">+ Add another colour</button>'
        : "";

      card.innerHTML =
        '<div class="item-top">' +
          '<input class="item-check" type="checkbox" ' + (s.selected?"checked":"") + ' onchange="toggleItem(\'' + item.code + '\',this.checked)" />' +
          imgHtml +
          '<div class="item-info">' +
            '<div class="item-name">' + item.name + '</div>' +
            '<div class="item-code">' + item.code + (item.hivis?' &nbsp;<span class="badge">Hi-Vis</span>':'') + '</div>' +
          '</div>' +
        '</div>' +
        '<div class="item-body' + (s.selected?" open":"") + '" id="body-' + item.code + '">' +
          '<div class="opt-row"><span class="opt-label">Logo:</span>' + logoBtns + '</div>' +
          '<div class="opt-row" style="margin-top:6px">' +
            '<label style="display:flex;align-items:center;gap:6px;font-size:12px;color:#555;cursor:pointer">' +
              '<input type="checkbox" ' + zeroHarmChecked + ' onchange="setZeroHarm(\'' + item.code + '\',this.checked)" style="accent-color:#185FA5;width:15px;height:15px" />' +
              'Add Zero Harm logo' +
            '</label>' +
          '</div>' +
          '<div class="sizes-wrap" style="margin-top:10px">' +
            '<div class="sizes-label">Qty by colour &amp; size:</div>' +
            '<div id="colourrows-' + item.code + '">' + colourRowsHtml + '</div>' +
            addColourBtn +
          '</div>' +
        '</div>';

      el.appendChild(card);
    });
  });
  updateSummary();
}

function toggleItem(code, checked) {
  state[code].selected = checked;
  document.getElementById("card-"+code).className = "item-card"+(checked?" selected":"");
  document.getElementById("body-"+code).className = "item-body"+(checked?" open":"");
  updateSummary();
}
function setLogo(code, logo) { state[code].logo = logo; renderCatalogue(); }
function setZeroHarm(code, checked) { state[code].zeroHarm = checked; }
function setRowColour(code, rowIdx, colour) { state[code].colourRows[rowIdx].colour = colour; renderCatalogue(); }
function setRowQty(code, rowIdx, size, val) { state[code].colourRows[rowIdx].qty[size] = parseInt(val)||0; updateSummary(); }
function addColourRow(code) {
  const item = CATALOGUE.flatMap(c=>c.items).find(i=>i.code===code);
  state[code].colourRows.push({colour: item.colours[0], qty: {}});
  renderCatalogue();
}
function removeColourRow(code, rowIdx) {
  state[code].colourRows.splice(rowIdx, 1);
  renderCatalogue();
}

function updateSummary() {
  const rows = [];
  CATALOGUE.forEach(cat => cat.items.forEach(item => {
    const s = state[item.code];
    if (!s.selected) return;
    s.colourRows.forEach(row => {
      const qtys = Object.entries(row.qty).filter(([,v])=>v>0);
      if (!qtys.length) return;
      const total = qtys.reduce((a,[,v])=>a+v,0);
      rows.push({name:item.name, colour:row.colour, logo:s.logo, zeroHarm:s.zeroHarm, qtys, total});
    });
  }));
  const box = document.getElementById("summaryBox");
  const rowsEl = document.getElementById("summaryRows");
  if (!rows.length) { box.style.display="none"; return; }
  box.style.display="block";
  rowsEl.innerHTML = rows.map(r=>`
    <div class="sum-row">
      <span class="sum-name">${r.name} <span style="color:#bbb;font-size:11px">${r.colour} · ${r.logo} logo${r.zeroHarm?" + Zero Harm":""}</span></span>
      <span class="sum-qty">${r.total} units — ${r.qtys.map(([s,v])=>s+":"+v).join(", ")}</span>
    </div>`).join("");
}

function previewOrder() {
  const sender = document.getElementById("senderName").value.trim();
  const dept = document.getElementById("dept").value.trim();
  const email = document.getElementById("senderEmail").value.trim();
  const due = document.getElementById("dueDate").value;
  const notes = document.getElementById("notes").value.trim();
  const shipTo = document.getElementById("shipTo").value.trim();

  if (!sender) { alert("Please enter your name before submitting."); return; }
  if (!shipTo) { alert("Please enter a delivery address before submitting."); return; }

  const lines = [];
  CATALOGUE.forEach(cat => cat.items.forEach(item => {
    const s = state[item.code];
    if (!s.selected) return;
    const logoStr = s.logo + " logo" + (s.zeroHarm ? " + Zero Harm logo" : "");
    s.colourRows.forEach(row => {
      const qtys = Object.entries(row.qty).filter(([,v])=>v>0);
      if (!qtys.length) return;
      const total = qtys.reduce((a,[,v])=>a+v,0);
      lines.push("  • " + item.name + " (" + item.code + ") — " + row.colour + " — " + logoStr + "\n    " + total + " units: " + qtys.map(([sz,v])=>"size "+sz+" × "+v).join(", "));
    });
  }));
  if (!lines.length) { alert("Please select at least one item with a quantity before previewing."); return; }

  const dueStr = due ? new Date(due).toLocaleDateString("en-AU",{day:"numeric",month:"long",year:"numeric"}) : "as soon as possible";
  const poNumber = document.getElementById("poNumber").value.trim();
  const poFiles = Array.from(document.getElementById("poFile").files);
  const poNote = poNumber ? "\n\nPURCHASE ORDER: " + poNumber : "";
  const poFileNote = poFiles.length > 0 ? "\n\nDOCUMENTS ATTACHED: " + poFiles.map(f=>f.name).join(", ") + "\n(Please see separate email with documents attached)" : "";
  const orderLines = "Hi Good Gear team,\n\nPlease find below our uniform order for Chamberlain Group" + (dept?" ("+dept+")":"") + ".\n\nORDER DETAILS\n" + lines.join("\n\n") + "\n\nSHIP TO:\n" + shipTo + "\n\nREQUIRED BY: " + dueStr + poNote + (notes?"\n\nNOTES:\n"+notes:"") + poFileNote + "\n\nPlease confirm receipt and advise of expected lead times and any out-of-stock items.\n\nKind regards,\n" + sender + (dept?"\n"+dept:"") + (email?"\n"+email:"");

  pendingOrder = { senderName: sender, dept, senderEmail: email, dueDate: due, shipTo, notes, poNumber, orderLines, cc: email };
  pendingOrder._poFiles = poFiles;


  document.getElementById("previewContent").textContent = orderLines;
  document.getElementById("previewMeta").textContent = "To: salessupport@goodgear.com.au" + (email ? "   |   CC: " + email : "") + "   |   Subject: Order for Chamberlain Group";
  document.getElementById("previewBox").style.display = "block";
  document.getElementById("successBox").style.display = "none";
  document.getElementById("previewBox").scrollIntoView({behavior:"smooth", block:"nearest"});
}

async function confirmSend() {
  if (!pendingOrder) return;
  const btn = document.getElementById("confirmBtn");
  btn.textContent = "Sending...";
  btn.disabled = true;
  try {
    // Use XMLHttpRequest instead of fetch to avoid CORS issues
    await new Promise((resolve, reject) => {
      const xhr = new XMLHttpRequest();
      xhr.open("POST", FLOW_URL, true);
      xhr.setRequestHeader("Content-Type", "application/json");
      xhr.onreadystatechange = function() {
        if (xhr.readyState === 4) {
          resolve(); // resolve regardless of status since no-cors won't give us status
        }
      };
      xhr.onerror = function() { resolve(); }; // resolve anyway, no-cors expected
      const payload = { senderName: pendingOrder.senderName, dept: pendingOrder.dept, senderEmail: pendingOrder.senderEmail, dueDate: pendingOrder.dueDate, shipTo: pendingOrder.shipTo, notes: pendingOrder.notes, poNumber: pendingOrder.poNumber, orderLines: pendingOrder.orderLines, cc: pendingOrder.cc };
      xhr.send(JSON.stringify(payload));
    });
    const hadFiles = pendingOrder._poFiles && pendingOrder._poFiles.length > 0;
    const fileNames = hadFiles ? pendingOrder._poFiles.map(f=>f.name).join(", ") : null;
    document.getElementById("previewBox").style.display = "none";
    const successBox = document.getElementById("successBox");
    successBox.innerHTML = hadFiles
      ? "&#10003; Your order has been sent to Good Gear (salessupport@goodgear.com.au)" + (pendingOrder.cc ? " — a copy has been sent to " + pendingOrder.cc + " for your records." : ".") + "<br><br>&#128206; <strong>Don't forget:</strong> please send a separate email to salessupport@goodgear.com.au with the following attached: <strong>" + fileNames + "</strong>"
      : "&#10003; Your order has been sent to Good Gear (salessupport@goodgear.com.au)" + (pendingOrder.cc ? " — a copy has been sent to " + pendingOrder.cc + " for your records." : ".");
    successBox.style.display = "block";
    successBox.scrollIntoView({behavior:"smooth", block:"nearest"});
    pendingOrder = null;
  } catch(err) {
    btn.textContent = "Confirm & send to Good Gear";
    btn.disabled = false;
    alert("Something went wrong sending the order. Please try again.");
  }
}

function cancelPreview() {
  document.getElementById("previewBox").style.display = "none";
  pendingOrder = null;
}

function clearAll() {
  initState();
  document.getElementById("previewBox").style.display = "none";
  document.getElementById("successBox").style.display = "none";
  document.getElementById("shipTo").value = "";
  document.getElementById("poNumber").value = "";
  document.getElementById("poFile").value = "";
  pendingOrder = null;
  renderCatalogue();
}

initState();
renderCatalogue();
</script>
